name: CI

on:
  push:
    branches: [master, main, feat/**]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Test
        run: go test ./...
      - name: Golden parity fixture
        run: go test ./internal/stepdsl/... ./internal/parity/... -count=1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Build portable
        shell: pwsh
        run: ./scripts/build-portable.ps1 -SkipTests -Version "${{ github.ref_name }}"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scenaria-portable
          path: dist/Scenaria-Portable.zip
