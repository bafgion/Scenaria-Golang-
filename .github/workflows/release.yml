name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress
      - name: Build release (portable + installer)
        shell: pwsh
        run: ./scripts/build-release.ps1 -SkipTests -Version "${{ github.ref_name }}"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Scenaria-Portable.zip
            dist/Scenaria-Setup.exe
            dist/latest.json
